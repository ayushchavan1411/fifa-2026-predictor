image: python:3.12-slim

stages:
  - lint
  - format
  - type_check
  - deadcode
  - security
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - venv/

before_script:
  - apt-get update && apt-get install -y git curl
  - python -m venv venv
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install ruff black flake8 mypy vulture pytest pytest-cov bandit pyupgrade

lint:
  stage: lint
  script:
    - source venv/bin/activate
    - ruff check app.py fifa_agent.py historical_data.py translations.py
    - flake8 --max-line-length=120 --extend-ignore=E203 app.py fifa_agent.py historical_data.py translations.py
  tags:
    - local

format:
  stage: format
  script:
    - source venv/bin/activate
    - black --check app.py fifa_agent.py historical_data.py translations.py
  tags:
    - local

type_check:
  stage: type_check
  script:
    - source venv/bin/activate
    - mypy app.py fifa_agent.py historical_data.py translations.py --ignore-missing-imports
  tags:
    - local

deadcode:
  stage: deadcode
  script:
    - source venv/bin/activate
    - vulture app.py fifa_agent.py historical_data.py translations.py --min-confidence=80
  tags:
    - local

security:
  stage: security
  script:
    - source venv/bin/activate
    - bandit -r app.py fifa_agent.py historical_data.py translations.py -ll -iii
  tags:
    - local
  allow_failure: true

test:
  stage: test
  script:
    - source venv/bin/activate
    - pip install -r requirements.txt
    - pytest tests/ --cov=. --cov-report=term
  tags:
    - local

coverage:
  stage: coverage
  script:
    - source venv/bin/activate
    - pip install -r requirements.txt
    - pytest tests/ --cov=. --cov-report=html --cov-report=term
  artifacts:
    paths:
      - htmlcov/
  tags:
    - local

changelog:
  stage: coverage
  script:
    - pip install git-cliff || true
    - git-cliff --output CHANGELOG.md || true
  tags:
    - local
  allow_failure: true

dependency_audit:
  stage: security
  script:
    - source venv/bin/activate
    - pip install pip-audit
    - pip-audit || true
  tags:
    - local
  allow_failure: true
